<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./scss/main.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="container">
          <img src="./imgs/nav_ logo.png" alt="" />

          <ul>
            <li>Home</li>
            <li>About</li>
            <li>Destination</li>
            <li>Tour</li>
            <li>Blog</li>
          </ul>

          <div class="nav_button">
            <div class="button_1">
              <button>Login</button>
            </div>
            <div class="button_2">
              <button>Sign up</button>
            </div>
          </div>
        </div>

      <div class="hero">
        <div class="container">
          <div class="hero_info">
            <h1>Get started your exciting <span>journey</span> with us.</h1>

            </p>

          <div class="hero_img_box">

              <img src="./imgs/hero_img_1.png" alt="" />

            <div class="hero_img_2">

            <div class="hero_img_3">
              <img src="./imgs/hero_img_3.png" alt="" />
            </div>

            <div class="hero_img_4">
              <img src="./imgs/hero_img_4.png" alt="" />
            </div>

            <div class="hero_img_5">
              <img src="./imgs/hero_img_5.png" alt="" />
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section>
        <div class="container"></div>
      </section>
    </main>
    <footer>
      <div class="container"></div>
    </footer>
